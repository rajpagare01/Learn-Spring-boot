# Application settings (classpath: /app.properties)
# Copy and adjust for your environment.

# Base URL used in emails (no trailing slash)
app.base.url=http://localhost:8080/OnlineVotingSystem

# Secret for vote receipt HMAC (change in production)
app.receipt.secret=change-this-receipt-secret-in-production

# Login email OTP when SMTP is configured. If false, login never uses OTP.
app.login.otp.enabled=true

# Require verified email before voting (sends verification link on register)
app.email.verification.required=false

# File uploads (profile & candidate photos). Created if missing.
app.upload.dir=

# SMTP — leave host empty to disable outbound email (OTP/login falls back if OTP disabled when mail fails)
mail.smtp.host=
mail.smtp.port=587
mail.smtp.user=
mail.smtp.password=
mail.smtp.auth=true
mail.smtp.starttls=true
mail.from.address=noreply@votesecure.local
mail.from.name=VoteSecure
